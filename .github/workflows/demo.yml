name: Demo GitHub Actions

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:

jobs:
  if-demo:
    runs-on: ubuntu-latest

    steps:
      - name: Solo en main
        run: echo "Estoy en main"
        if: github.ref == 'refs/heads/main'

      - name: Solo en PR
        run: echo "Esto es un PR"
        if: github.event_name == 'pull_request'
