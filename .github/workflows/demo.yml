name: Demo Permissions

on: [push]

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - run: |
          git config --global user.name "demo"
          git config --global user.email "demo@test.com"
          git commit --allow-empty -m "test"
          git push
