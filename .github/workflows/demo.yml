name: Demo GitHub Actions

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:

jobs:
  env-demo:
    runs-on: ubuntu-latest

    env:
      APP_NAME: mi-app

    steps:
      - name: Usar variable global
        run: echo "App: $APP_NAME"

      - name: Variable por step
        run: echo "Hola $NAME"
        env:
          NAME: Tatiana
