name: Demo GitHub Actions

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - run: echo "Hola mundo" > archivo.txt

      - uses: actions/upload-artifact@v4
        with:
          name: archivo-demo
          path: archivo.txt

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: archivo-demo

      - run: cat archivo.txt
