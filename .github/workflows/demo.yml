name: Demo Completo

on: [push]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - id: version
        run: echo "version=1.0.${{ github.run_number }}" >> $GITHUB_OUTPUT

  test:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - run: echo "Testing version ${{ needs.build.outputs.version }}"

  deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Deploy seguro
        run: echo "Deploy con secret"
        env:
          TOKEN: ${{ secrets.DEMO_SECRET }}
