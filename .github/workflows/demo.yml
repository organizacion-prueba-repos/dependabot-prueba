name: Demo Outputs

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      mensaje: ${{ steps.set-output.outputs.mensaje }}

    steps:
      - id: set-output
        run: echo "mensaje=Hola desde build" >> $GITHUB_OUTPUT

  test:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - run: echo "${{ needs.build.outputs.mensaje }}"
