name: Demo GitHub Actions

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:

jobs:
  matrix-control:
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        node: [16, 18]

        exclude:
          - os: windows-latest
            node: 16

        include:
          - os: ubuntu-latest
            node: 20
            experimental: true

    steps:
      - run: |
          echo "OS: ${{ matrix.os }} - Node: ${{ matrix.node }}"
